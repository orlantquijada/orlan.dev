packages:
  - apps/*
  - packages/*
  - packages/ui/*

allowBuilds:
  esbuild: true
  sharp: true

catalog:
  "@biomejs/biome": 2.4.16
  "@date-fns/tz": 1.5.0
  "@pandacss/dev": 1.11.1
  "@pandacss/preset-panda": 1.11.1
  "@radix-ui/colors": ^3.0.0
  "@radix-ui/react-icons": ^1.3.2
  "@tsconfig/strictest": ^2.0.8
  date-fns: 4.4.0
  motion: 12.40.0
  next: 16.2.6
  tailwind-merge: ^3.6.0
  tailwindcss: ^4
  typescript: 5.9.3
  ultracite: 7.8.0

catalogs:
  react19:
    "@types/react": ^19.2.15
    "@types/react-dom": ^19.2.3
    react: ^19.2.6
    react-dom: ^19.2.6

minimumReleaseAgeExclude:
  - "@clack/core@1.4.0"
  - "@clack/prompts@1.5.0"
  - date-fns@4.4.0
  - next-mdx-remote-client@2.1.11

onlyBuiltDependencies:
  - "@biomejs/biome"
  - contentlayer2
  - esbuild
  - protobufjs
  - sharp
